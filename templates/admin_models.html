<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>VISCANE | Model Updates</title>
</head>
<body class="admin-layout">
    <div class="dashboard-bg"></div>

    <header class="dashboard-header">
        <div class="header-content">
            <div class="brand">
                <div class="brand-icon">
                    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="VISCANE Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
                </div>
                <div>
                    <p class="brand-title">Model Updates</p>
                    <p class="brand-subtitle">Receive retrained models from superadmin</p>
                </div>
            </div>
            <div class="header-actions">
                <a class="btn light" href="/admin">
                    <ion-icon name="arrow-back-outline"></ion-icon>
                    Back to Home
                </a>
                <a class="btn light" href="/admin-logout">
                    <ion-icon name="power"></ion-icon>
                    Logout
                </a>
            </div>
        </div>
    </header>

    <main class="dashboard-container fade-in">
        {% if message %}
            <div class="form-success">{{ message }}</div>
        {% endif %}

        <section class="panel">
            <div class="panel-header">
                <div>
                    <h3 class="panel-title">Deploy New Model</h3>
                    <p class="panel-subtitle">Upload the latest model package</p>
                </div>
            </div>
            <div class="stat-label">Current Model</div>
            <div class="stat-helper">{{ config.model_filename if config.model_filename else 'No model deployed yet.' }}</div>
            <form method="POST" enctype="multipart/form-data">
                <input class="stat-input" type="file" name="model_file" required>
                <button class="btn primary" type="submit" style="margin-top: 12px;">
                    <ion-icon name="cloud-upload-outline"></ion-icon>
                    Upload Model
                </button>
            </form>
        </section>

        <div class="footer-link">VISCANE Admin | Model Updates</div>
    </main>
</body>
</html>
