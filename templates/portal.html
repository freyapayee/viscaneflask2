<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>VISCANE | Welcome</title>
</head>
<body>
    <div class="card fade-in">
        <div style="text-align: center; margin-bottom: 30px;">
            <div style="background: var(--primary-green); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); overflow: hidden;">
                <img src="{{ url_for('static', filename='logo.jpg') }}" alt="VISCANE Logo" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <h2 style="margin: 20px 0 5px;">Welcome to VISCANE</h2>
            <p style="color: rgba(255,255,255,0.6); font-size: 14px;">Select your portal to continue</p>
        </div>

        <div class="portal-item" onclick="location.href='/auth?mode=login'">
            <div class="icon-circle" style="background: #43A047;">
                <ion-icon name="person-outline" style="font-size: 28px;"></ion-icon>
            </div>
            <h3 style="margin: 0; font-size: 18px;">Farmer Portal</h3>
            <p style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 5px;">Access AI-powered quality analysis</p>
        </div>

        <div class="portal-item" onclick="location.href='/admin-login'">
            <div class="icon-circle" style="background: #1E88E5;">
                <ion-icon name="settings-outline" style="font-size: 28px;"></ion-icon>
            </div>
            <h3 style="margin: 0; font-size: 18px;">Admin Portal</h3>
            <p style="font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 5px;">Manage users and system performance</p>
        </div>

        <div style="margin-top: 25px;">
            <button class="outline-btn">System Overview</button>
            <button class="outline-btn">Manual vs AI Comparison</button>
        </div>
    </div>
</body>
</html>
