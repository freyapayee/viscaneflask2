<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>VISCANE | Edit Farmer</title>
</head>
<body class="admin-layout">
    <div class="dashboard-bg"></div>

    <header class="dashboard-header">
        <div class="header-content">
            <div class="brand">
                <div class="brand-icon">
                    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="VISCANE Logo" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">
                </div>
                <div>
                    <p class="brand-title">Edit Farmer</p>
                    <p class="brand-subtitle">Update farmer profile details</p>
                </div>
            </div>
            <div class="header-actions">
                <a class="btn light" href="/admin">
                    <ion-icon name="arrow-back-outline"></ion-icon>
                    Back to Home
                </a>
                <a class="btn light" href="/admin-logout">
                    <ion-icon name="power"></ion-icon>
                    Logout
                </a>
            </div>
        </div>
    </header>

    <main class="dashboard-container fade-in">
        <form class="panel" method="POST">
            <div class="panel-header">
                <div>
                    <h3 class="panel-title">{{ user.fullname }}</h3>
                    <p class="panel-subtitle">Farmer account details</p>
                </div>
                <button class="btn primary" type="submit">
                    <ion-icon name="save-outline"></ion-icon>
                    Save
                </button>
            </div>

            <div class="stat-label">Full Name</div>
            <input class="stat-input" type="text" name="fullname" value="{{ user.fullname }}" required>
            <div class="stat-label">Email</div>
            <input class="stat-input" type="email" name="email" value="{{ user.email }}" required>
            <div class="stat-label">Phone</div>
            <input class="stat-input" type="text" name="phone" value="{{ user.phone }}" required>
            <div class="stat-label">Province</div>
            <input class="stat-input" type="text" name="province" value="{{ user.province }}">
            <div class="stat-label">Municipality</div>
            <input class="stat-input" type="text" name="municipality" value="{{ user.municipality }}">
            <div class="stat-label">Barangay</div>
            <input class="stat-input" type="text" name="barangay" value="{{ user.barangay }}">
        </form>

        <div class="footer-link">VISCANE Admin | Farmer Account Management</div>
    </main>
</body>
</html>
